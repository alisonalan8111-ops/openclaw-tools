<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>情绪日报 - 多日趋势分析</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans SC', -apple-system, sans-serif; background: #0f0f1a; color: #e2e8f0; min-height: 100vh; }
  
  .hero { text-align: center; padding: 50px 20px 30px; }
  .hero h1 { font-size: 32px; font-weight: 700; background: linear-gradient(135deg, #f472b6, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
  .hero p { color: #64748b; font-size: 15px; }
  
  .container { max-width: 960px; margin: 0 auto; padding: 0 20px 60px; }
  
  .input-section { margin-bottom: 40px; }
  .input-label { font-size: 14px; color: #94a3b8; margin-bottom: 10px; font-weight: 500; }
  .input-box { width: 100%; min-height: 280px; padding: 16px; font-size: 14px; background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 12px; color: #e2e8f0; resize: vertical; font-family: inherit; outline: none; line-height: 1.7; }
  .input-box:focus { border-color: #a78bfa; }
  .input-hint { font-size: 12px; color: #475569; margin-top: 8px; text-align: center; }
  .input-format { font-size: 12px; color: #475569; margin-top: 6px; }
  .input-format span { color: #a78bfa; }
  
  .btn-row { display: flex; gap: 12px; justify-content: center; margin: 24px 0; }
  .btn { padding: 12px 32px; font-size: 15px; font-weight: 600; border: none; border-radius: 10px; cursor: pointer; transition: all 0.2s; font-family: inherit; }
  .btn-primary { background: linear-gradient(135deg, #a78bfa, #f472b6); color: #fff; }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-secondary { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
  .btn-secondary:hover { border-color: #a78bfa; color: #e2e8f0; }
  
  .report { display: none; }
  .report.show { display: block; }
  
  .report-header { text-align: center; padding: 30px 0 20px; }
  .report-title { font-size: 24px; font-weight: 700; color: #f1f5f9; }
  
  /* 按天情绪曲线 - 核心图表 */
  .trend-section { background: #1a1a2e; border-radius: 16px; padding: 28px; border: 1px solid #2a2a4a; margin-bottom: 28px; }
  .trend-title { font-size: 16px; font-weight: 600; color: #f1f5f9; margin-bottom: 6px; text-align: center; }
  .trend-subtitle { font-size: 13px; color: #64748b; margin-bottom: 20px; text-align: center; }
  .trend-wrap { position: relative; height: 240px; }
  
  /* 每日卡片列表 */
  .daily-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; margin-bottom: 28px; }
  .daily-card { background: #1a1a2e; border-radius: 14px; padding: 20px 16px; border: 1px solid #2a2a4a; transition: border-color 0.2s; cursor: default; }
  .daily-card:hover { border-color: #a78bfa; }
  .daily-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .daily-card-date { font-size: 12px; color: #64748b; }
  .daily-card-emoji { font-size: 24px; }
  .daily-card-level { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
  .daily-card-stats { font-size: 12px; color: #64748b; }
  .daily-card-bar { height: 4px; background: #2a2a4a; border-radius: 2px; margin-top: 12px; overflow: hidden; }
  .daily-card-bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
  
  /* 情绪分布 */
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
  .chart-card { background: #1a1a2e; border-radius: 16px; padding: 24px; border: 1px solid #2a2a4a; }
  .chart-title { font-size: 15px; font-weight: 600; color: #f1f5f9; margin-bottom: 20px; text-align: center; }
  .chart-wrap { position: relative; height: 240px; }
  .chart-wrap canvas { max-height: 100%; }
  
  /* 关键词 */
  .keywords-section { background: #1a1a2e; border-radius: 16px; padding: 24px; border: 1px solid #2a2a4a; margin-bottom: 24px; }
  .keywords-title { font-size: 15px; font-weight: 600; color: #f1f5f9; margin-bottom: 16px; }
  .keywords-cloud { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
  .keyword-tag { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; }
  
  /* 时间线 */
  .timeline-card { background: #1a1a2e; border-radius: 16px; padding: 24px; border: 1px solid #2a2a4a; }
  .timeline-title { font-size: 15px; font-weight: 600; color: #f1f5f9; margin-bottom: 20px; }
  .timeline-date-group { margin-bottom: 20px; }
  .timeline-date-header { font-size: 12px; color: #a78bfa; margin-bottom: 12px; font-weight: 600; }
  .timeline-item { display: flex; gap: 14px; margin-bottom: 12px; align-items: flex-start; }
  .timeline-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .timeline-text { font-size: 13px; color: #94a3b8; line-height: 1.6; }
  
  @media (max-width: 640px) {
    .charts-row { grid-template-columns: 1fr; }
    .daily-cards { grid-template-columns: 1fr 1fr; }
    .hero h1 { font-size: 24px; }
  }
</style>
</head>
<body>

<div class="hero">
  <h1>🌸 情绪日报</h1>
  <p>追踪每日情绪变化，看见内心的起伏</p>
</div>

<div class="container">
  <div class="input-section">
    <div class="input-label">📋 粘贴聊天记录（支持多天）</div>
    <textarea class="input-box" id="chatInput" placeholder="把聊天记录粘贴到这里。

格式：日期标记 + 当天聊天记录
日期标记写法：【日期:2026-04-26】

示例：
【日期:2026-04-26】
主人：今天加班好累
超体01号：辛苦了
主人：吃了火锅心情好多了

【日期:2026-04-25】
主人：今天有点难过
超体01号：怎么了？
主人：没事就是想家了

支持直接复制微信聊天记录，只需在每天开头加一行日期标记。"></textarea>
    <div class="input-hint">数据全程在本地处理，不会上传到任何服务器</div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="generateReport()">生成情绪报告 ✨</button>
      <button class="btn btn-secondary" onclick="loadSample()">查看示例 📖</button>
    </div>
  </div>

  <div class="report" id="report">
    <div class="report-header">
      <div class="report-title">🌈 情绪趋势报告</div>
    </div>
    
    <!-- 按天情绪曲线 - 核心 -->
    <div class="trend-section">
      <div class="trend-title">📈 每日情绪走势</div>
      <div class="trend-subtitle">情绪指数 = 每天积极情绪 - 消极情绪，正值偏积极，负值偏消极</div>
      <div class="trend-wrap"><canvas id="trendChart"></canvas></div>
    </div>
    
    <!-- 每日卡片 -->
    <div class="daily-cards" id="dailyCards"></div>
    
    <!-- 情绪分布 + 情绪类型统计 -->
    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-title">情绪类型分布</div>
        <div class="chart-wrap"><canvas id="pieChart"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">积极 vs 消极对比</div>
        <div class="chart-wrap"><canvas id="barChart"></canvas></div>
      </div>
    </div>
    
    <!-- 关键词 -->
    <div class="keywords-section">
      <div class="keywords-title">🔑 情绪关键词</div>
      <div class="keywords-cloud" id="keywordsCloud"></div>
    </div>
    
    <!-- 时间线 -->
    <div class="timeline-card">
      <div class="timeline-title">📊 情绪时间线</div>
      <div id="timelineList"></div>
    </div>
    
    <div class="btn-row" style="margin-top: 30px;">
      <button class="btn btn-secondary" onclick="window.print()">🖨️ 打印 / 保存PDF</button>
    </div>
  </div>
</div>

<script>
// ============ 情绪词典 ============
const emotionDict = {
  '开心': { category: '积极', color: '#10b981', score: 3, weight: 3, keywords: ['开心','高兴','快乐','愉快','幸福','兴奋','激动','棒','太棒了','不错','真好','真好笑','哈哈哈','笑死','绝了','完美','赞','给力','厉害','牛','优秀','真好'] },
  '平静': { category: '平静', color: '#38bdf8', score: 1, weight: 1, keywords: ['平静','淡定','还好','还行','没事','无所谓','放松','轻松','舒适'] },
  '感动': { category: '积极', color: '#34d399', score: 2, weight: 2, keywords: ['感动','暖心','温馨','贴心','幸福','谢谢','感谢','感激','真好','棒','贴心'] },
  '期待': { category: '积极', color: '#a78bfa', score: 2, weight: 1, keywords: ['期待','希望','盼望','憧憬','向往'] },
  
  '生气': { category: '消极', color: '#ef4444', score: -3, weight: 3, keywords: ['生气','愤怒','气','怒','火','气愤','恼火','不爽','讨厌','烦人','恶心','滚','神经病','有病','废物','垃圾','过分','无语了','服了','吐'] },
  '焦虑': { category: '消极', color: '#f97316', score: -2, weight: 2, keywords: ['焦虑','担心','忧虑','不安','紧张','怕','慌','着急','心慌','忐忑','鸭梨','压力','焦虑','心里没底'] },
  '难过': { category: '消极', color: '#6366f1', score: -2, weight: 2, keywords: ['难过','伤心','悲伤','痛苦','难受','心碎','失落','沮丧','绝望','崩溃','想哭','哭了'] },
  '孤独': { category: '消极', color: '#8b5cf6', score: -2, weight: 1, keywords: ['孤独','孤单','寂寞','无聊','空虚','没人','没人理','没人陪'] },
  '委屈': { category: '消极', color: '#ec4899', score: -2, weight: 2, keywords: ['委屈','冤枉','不公平','憋屈'] },
  '疲惫': { category: '消极', color: '#64748b', score: -1, weight: 1, keywords: ['累','疲惫','疲倦','困','困了','累了','精疲','无力','没精神','疲倦'] },
  '失落': { category: '消极', color: '#6366f1', score: -1, weight: 1, keywords: ['失落','丧','低迷','消极'] },
};

function analyzeEmotions(text) {
  const results = { 
    categories: {},   // { emotionName: count }
    totalScore: 0, 
    totalWeight: 0,
    count: 0, 
    matchedKeywords: [] 
  };
  
  const sentences = text.split(/[。！？\n；;]/).filter(s => s.trim().length > 2);
  
  sentences.forEach(sentence => {
    let found = false;
    for (const [emotion, data] of Object.entries(emotionDict)) {
      for (const kw of data.keywords) {
        if (sentence.includes(kw)) {
          results.categories[emotion] = (results.categories[emotion] || 0) + 1;
          results.totalScore += data.score * data.weight;
          results.totalWeight += data.weight;
          results.count++;
          found = true;
          if (!results.matchedKeywords.find(k => k.keyword === kw)) {
            results.matchedKeywords.push({ keyword: kw, emotion, sentence: sentence.trim().slice(0, 60) });
          }
        }
      }
    }
  });
  
  return results;
}

function getDayScore(analysis) {
  if (analysis.totalWeight === 0) return 0;
  return analysis.totalScore / analysis.totalWeight;
}

function getOverallLevel(avgScore) {
  if (avgScore >= 1.5)  return { label: '心情很好',  emoji: '😊', color: '#10b981' };
  if (avgScore >= 0.5)  return { label: '心情不错',  emoji: '🙂', color: '#34d399' };
  if (avgScore >= -0.5) return { label: '心情平静',  emoji: '😌', color: '#38bdf8' };
  if (avgScore >= -1.5) return { label: '心情低落',  emoji: '😔', color: '#f97316' };
  return                      { label: '情绪波动',  emoji: '😢', color: '#ef4444' };
}

function getDayLevel(dayScore) {
  if (dayScore >= 1.5)  return { label: '心情很好',  emoji: '😊', color: '#10b981' };
  if (dayScore >= 0.5)  return { label: '心情不错',  emoji: '🙂', color: '#34d399' };
  if (dayScore >= -0.5) return { label: '心情平静',  emoji: '😌', color: '#38bdf8' };
  if (dayScore >= -1.5) return { label: '心情低落',  emoji: '😔', color: '#f97316' };
  return                      { label: '情绪波动',  emoji: '😢', color: '#ef4444' };
}

function parseInput(text) {
  // 按日期分割：支持 【日期:2026-04-26】 或 【2026-04-26】 或 Date:2026-04-26
  const datePattern = /[【\[(]?(日期|Date|date)[:：]?\s*)?(\d{4}[-/]\d{1,2}[-/]\d{1,2})[】\]]?/gi;
  const blocks = [];
  let currentDate = null;
  let currentContent = [];
  
  const lines = text.split('\n');
  for (const line of lines) {
    const dateMatch = line.match(datePattern);
    if (dateMatch) {
      if (currentDate !== null || currentContent.length > 0) {
        blocks.push({ date: currentDate, content: currentContent.join('\n') });
      }
      const dateStr = dateMatch[dateMatch.length - 1];
      currentDate = dateStr.replace(/\//g, '-');
      // 标准化为 YYYY-MM-DD
      const parts = currentDate.match(/(\d+)[-/](\d+)[-/](\d+)/);
      if (parts) {
        currentDate = `${parts[1]}-${parts[2].padStart(2,'0')}-${parts[3].padStart(2,'0')}`;
      }
      currentContent = [];
    } else if (currentDate !== null) {
      currentContent.push(line);
    }
  }
  
  if (currentDate !== null || currentContent.length > 0) {
    blocks.push({ date: currentDate || new Date().toISOString().slice(0,10), content: currentContent.join('\n') });
  }
  
  return blocks;
}

let trendChart, pieChart, barChart;

function generateReport() {
  const text = document.getElementById('chatInput').value.trim();
  if (!text) { alert('请先粘贴聊天记录'); return; }
  
  const blocks = parseInput(text);
  if (blocks.length === 0) { alert('未能识别日期标记，请使用【日期:2026-04-26】格式'); return; }
  
  // 按天分析
  const dayResults = blocks.map(b => ({
    date: b.date,
    analysis: analyzeEmotions(b.content),
    dayScore: 0,
  }));
  
  dayResults.forEach(d => {
    d.dayScore = getDayScore(d.analysis);
    d.level = getDayLevel(d.dayScore);
  });
  
  // 按日期排序
  dayResults.sort((a, b) => a.date.localeCompare(b.date));
  
  // 全局汇总
  const totalCategories = {};
  let totalSignals = 0;
  let totalPositive = 0;
  let totalNegative = 0;
  let allKeywords = [];
  
  dayResults.forEach(d => {
    totalSignals += d.analysis.count;
    allKeywords.push(...d.analysis.matchedKeywords);
    for (const [emotion, cnt] of Object.entries(d.analysis.categories)) {
      totalCategories[emotion] = (totalCategories[emotion] || 0) + cnt;
      if (emotionDict[emotion]?.category === '积极') totalPositive += cnt;
      if (emotionDict[emotion]?.category === '消极') totalNegative += cnt;
    }
  });
  
  // 去重关键词
  const kwMap = new Map();
  allKeywords.forEach(k => {
    if (!kwMap.has(k.keyword)) kwMap.set(k.keyword, k);
  });
  allKeywords = Array.from(kwMap.values());
  
  // 总体评分
  const avgScore = dayResults.length > 0 ? dayResults.reduce((s, d) => s + d.dayScore, 0) / dayResults.length : 0;
  const overall = getOverallLevel(avgScore);
  
  document.getElementById('report').classList.add('show');
  
  // ===== 核心：按天情绪曲线 =====
  if (trendChart) trendChart.destroy();
  const trendCtx = document.getElementById('trendChart').getContext('2d');
  const labels = dayResults.map(d => {
    const parts = d.date.split('-');
    return `${parseInt(parts[1])}/${parseInt(parts[2])}`;
  });
  const scores = dayResults.map(d => parseFloat(d.dayScore.toFixed(2)));
  
  // 判断整体趋势
  let trendLabel = '平稳';
  if (dayResults.length >= 2) {
    const first = dayResults[0].dayScore;
    const last = dayResults[dayResults.length - 1].dayScore;
    if (last - first > 1) trendLabel = '上升 ↗';
    else if (first - last > 1) trendLabel = '下降 ↘';
  }
  
  const scoreColor = (s) => s >= 0.5 ? '#10b981' : s <= -0.5 ? '#ef4444' : '#38bdf8';
  const pointColors = scores.map(s => scoreColor(s));
  
  trendChart = new Chart(trendCtx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: '情绪指数',
        data: scores,
        borderColor: '#a78bfa',
        backgroundColor: (ctx) => {
          const chart = ctx.chart;
          const {ctx: c, chartArea} = chart;
          if (!chartArea) return 'rgba(167,139,250,0.1)';
          const gradient = c.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
          gradient.addColorStop(0, 'rgba(167,139,250,0.25)');
          gradient.addColorStop(1, 'rgba(167,139,250,0)');
          return gradient;
        },
        fill: true,
        tension: 0.35,
        pointBackgroundColor: pointColors,
        pointBorderColor: pointColors,
        pointRadius: 6,
        pointHoverRadius: 8,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { intersect: false, mode: 'index' },
      scales: {
        y: {
          min: -3, max: 3,
          grid: { color: '#2a2a4a' },
          ticks: {
            color: '#64748b',
            callback: v => v > 0 ? `+${v}` : v === 0 ? '0' : `${v}`,
            stepSize: 1
          },
          title: { display: true, text: '情绪指数（正=积极 / 负=消极）', color: '#475569', font: { size: 11 } }
        },
        x: { grid: { color: '#2a2a4a' }, ticks: { color: '#94a3b8', font: { size: 12 } } }
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a1a2e',
          borderColor: '#2a2a4a',
          borderWidth: 1,
          titleColor: '#f1f5f9',
          bodyColor: '#94a3b8',
          callbacks: {
            label: ctx => {
              const idx = ctx.dataIndex;
              const level = dayResults[idx]?.level;
              return `${ctx.raw}  ${level?.emoji || ''} ${level?.label || ''}`;
            }
          }
        }
      }
    }
  });
  
  // ===== 每日卡片 =====
  const totalDays = dayResults.length;
  document.getElementById('dailyCards').innerHTML = dayResults.map(d => {
    const catKeys = Object.keys(d.analysis.categories);
    const dominant = catKeys.length > 0 ? catKeys.sort((a, b) => d.analysis.categories[b] - d.analysis.categories[a])[0] : '平静';
    const maxBarWidth = Math.min(100, Math.abs(d.dayScore) / 3 * 100);
    const barColor = d.dayScore >= 0 ? '#10b981' : '#ef4444';
    return `<div class="daily-card">
      <div class="daily-card-header">
        <div class="daily-card-date">${d.date}</div>
        <div class="daily-card-emoji">${d.level.emoji}</div>
      </div>
      <div class="daily-card-level" style="color:${d.level.color}">${d.level.label}</div>
      <div class="daily-card-stats">${d.analysis.count}个情绪信号 · ${dominant}</div>
      <div class="daily-card-bar">
        <div class="daily-card-bar-fill" style="width:${maxBarWidth}%;background:${barColor}"></div>
      </div>
    </div>`;
  }).join('');
  
  // ===== 情绪分布饼图 =====
  if (pieChart) pieChart.destroy();
  const pieCtx = document.getElementById('pieChart').getContext('2d');
  const pieLabels = Object.keys(totalCategories);
  const pieData = pieLabels.map(k => totalCategories[k]);
  const pieColors = pieLabels.map(k => emotionDict[k]?.color || '#94a3b8');
  
  pieChart = new Chart(pieCtx, {
    type: 'doughnut',
    data: { labels: pieLabels, datasets: [{ data: pieData, backgroundColor: pieColors, borderWidth: 0, hoverOffset: 6 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom', labels: { color: '#94a3b8', padding: 14, font: { size: 12 }, boxWidth: 12 } },
      }
    }
  });
  
  // ===== 积极消极对比柱状图 =====
  if (barChart) barChart.destroy();
  const barCtx = document.getElementById('barChart').getContext('2d');
  barChart = new Chart(barCtx, {
    type: 'bar',
    data: {
      labels: ['积极信号', '消极信号'],
      datasets: [{
        data: [totalPositive, totalNegative],
        backgroundColor: ['#10b981', '#ef4444'],
        borderRadius: 8,
        barThickness: 48,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        y: { beginAtZero: true, grid: { color: '#2a2a4a' }, ticks: { color: '#64748b' } },
        x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
      },
      plugins: { legend: { display: false } }
    }
  });
  
  // ===== 关键词云 =====
  const emotionColors = {
    '开心': '#10b981', '平静': '#38bdf8', '感动': '#34d399', '期待': '#a78bfa',
    '生气': '#ef4444', '焦虑': '#f97316', '难过': '#6366f1', '孤独': '#8b5cf6',
    '委屈': '#ec4899', '疲惫': '#64748b', '失落': '#6366f1',
  };
  const kwHtml = allKeywords.slice(0, 24).map(m => {
    const color = emotionColors[m.emotion] || '#94a3b8';
    const size = 12 + Math.random() * 7;
    return `<span class="keyword-tag" style="background:${color}22;color:${color};font-size:${size}px;border:1px solid ${color}44">${m.keyword}</span>`;
  }).join('');
  document.getElementById('keywordsCloud').innerHTML = kwHtml || '<span style="color:#475569">未检测到情绪关键词</span>';
  
  // ===== 时间线 =====
  const timelineByDate = {};
  dayResults.forEach(d => {
    if (!timelineByDate[d.date]) timelineByDate[d.date] = [];
    d.analysis.matchedKeywords.forEach(k => {
      timelineByDate[d.date].push(k);
    });
  });
  
  let timelineHtml = '';
  for (const [date, items] of Object.entries(timelineByDate)) {
    timelineHtml += `<div class="timeline-date-group">
      <div class="timeline-date-header">📅 ${date}</div>
      ${items.slice(0, 5).map(item => {
        const color = emotionColors[item.emotion] || '#94a3b8';
        return `<div class="timeline-item">
          <div class="timeline-dot" style="background:${color}"></div>
          <div class="timeline-text">${item.sentence}</div>
        </div>`;
      }).join('')}
    </div>`;
  }
  document.getElementById('timelineList').innerHTML = timelineHtml || '<div style="color:#475569;text-align:center;padding:20px">暂无情绪时间线数据</div>';
  
  document.getElementById('report').scrollIntoView({ behavior: 'smooth' });
}
